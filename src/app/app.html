<div class="app-shell">
  <aside class="sidebar" aria-label="Main navigation">
    <header class="sidebar-head">
      <div class="sidebar-mark" aria-hidden="true">
        <svg class="sidebar-mark-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
          />
        </svg>
      </div>
      <div class="sidebar-head-text">
        <h1 class="sidebar-brand">Kitchen notes</h1>
        <p class="sidebar-tagline">Recipes, search &amp; ideas</p>
      </div>
    </header>

    <nav class="nav" aria-label="App sections">
      <a
        routerLink="/recipe-box"
        routerLinkActive="active"
        class="nav-item"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="nav-icon" aria-hidden="true">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
            />
          </svg>
        </span>
        <span class="nav-item-text">
          <span class="nav-item-title">Recipe box</span>
          <span class="nav-item-line">Kitchen notes</span>
          <span class="nav-item-line">Browse &amp; search</span>
          <span class="nav-item-line">See all recipes and filter by name</span>
        </span>
      </a>

      <button type="button" class="nav-item nav-item--action" (click)="openNewRecipeDialog()">
        <span class="nav-icon nav-icon--accent" aria-hidden="true">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
        </span>
        <span class="nav-item-text">
          <span class="nav-item-title">New recipe</span>
          <span class="nav-item-line">Add a recipe in a floating window</span>
        </span>
      </button>

      <a routerLink="/about" routerLinkActive="active" class="nav-item">
        <span class="nav-icon" aria-hidden="true">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </span>
        <span class="nav-item-text">
          <span class="nav-item-title">About</span>
          <span class="nav-item-line">App info and credits</span>
        </span>
      </a>
    </nav>
  </aside>

  <main class="main">
    <router-outlet />
  </main>
</div>
